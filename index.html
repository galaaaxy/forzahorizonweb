<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Velocity Afterglow is a fast 3D browser racing game with traffic, drifting, nitro, upgrades, maps, and local leaderboards." />
  <meta name="theme-color" content="#07111f" />
  <meta property="og:title" content="Velocity Afterglow" />
  <meta property="og:description" content="A fast 3D racing game built in one HTML file with Three.js." />
  <meta property="og:type" content="website" />
  <title>Velocity Afterglow</title>
  <style>
    :root {
      color-scheme: dark;
      --glass: rgba(9, 15, 23, 0.48);
      --line: rgba(255, 255, 255, 0.22);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #83c9ff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    button,
    select {
      font: inherit;
    }

    .hud {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      z-index: 8;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 16px;
      color: var(--text);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.48);
      pointer-events: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(86px, auto));
      gap: 8px 14px;
      align-items: start;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.2);
    }

    .stat {
      min-width: 86px;
    }

    .wide-stat {
      grid-column: 1 / -1;
    }

    .label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--muted);
    }

    .value {
      display: block;
      font-size: 18px;
      font-weight: 850;
      line-height: 1.15;
    }

    .nitro {
      grid-column: 1 / -1;
      width: min(226px, 49vw);
    }

    .bar {
      width: 100%;
      height: 9px;
      margin-top: 5px;
      overflow: hidden;
      border-radius: 8px;
      background: rgba(10, 20, 32, 0.52);
      border: 1px solid rgba(255, 255, 255, 0.28);
    }

    .bar-fill {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, #12d6c4, #71e66f 48%, #f6e35a);
      transform-origin: left center;
      transform: scaleX(1);
      transition: background 160ms ease;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      pointer-events: auto;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: white;
      background: var(--glass);
      cursor: pointer;
      display: grid;
      place-items: center;
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      -webkit-tap-highlight-color: transparent;
    }

    .hint {
      max-width: min(42vw, 390px);
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      text-align: right;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
      pointer-events: none;
    }

    .settings {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + 66px);
      right: 16px;
      z-index: 14;
      width: min(280px, calc(100vw - 32px));
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: white;
      background: rgba(9, 15, 23, 0.82);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(16px);
      transform-origin: top right;
    }

    .settings[hidden] {
      display: none;
    }

    .settings h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .setting-row {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    .setting-row label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
    }

    .setting-row select {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 8px;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      padding: 0 10px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 38px;
    }

    .toggle-row input {
      width: 20px;
      height: 20px;
      accent-color: #71e66f;
    }

    .menu-actions,
    .shop-grid,
    .leaderboard-list {
      display: grid;
      gap: 8px;
    }

    .menu-actions {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 12px;
    }

    .menu-button,
    .shop-button {
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      color: white;
      background: rgba(255, 255, 255, 0.11);
      cursor: pointer;
      font-weight: 800;
    }

    .menu-button:disabled,
    .shop-button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .shop-row,
    .leaderboard-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
    }

    .leaderboard-row:first-child,
    .shop-row:first-child {
      border-top: 0;
    }

    .setting-copy {
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 24px;
      color: white;
      background: radial-gradient(circle at center, rgba(10, 18, 28, 0.34), rgba(5, 9, 15, 0.74));
      text-align: center;
    }

    .overlay.is-visible {
      display: grid;
    }

    .overlay-stack {
      display: grid;
      gap: 14px;
    }

    .panel {
      width: min(370px, calc(100vw - 48px));
      padding: 23px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(15, 24, 35, 0.82);
      box-shadow: 0 20px 56px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(14px);
    }

    .panel h1 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: 0;
    }

    .panel p {
      margin: 0 0 18px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 15px;
    }

    .restart {
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: #ffffff;
      color: #101925;
      font-size: 16px;
      font-weight: 850;
      cursor: pointer;
    }

    .panel-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .touch-controls {
      position: fixed;
      inset: auto 0 env(safe-area-inset-bottom, 0) 0;
      z-index: 10;
      display: none;
      justify-content: space-between;
      align-items: flex-end;
      padding: 18px;
      pointer-events: none;
    }

    .cluster,
    .pedals {
      display: grid;
      grid-template-columns: repeat(2, 66px);
      gap: 12px;
      pointer-events: auto;
    }

    .pedals {
      grid-template-columns: repeat(3, 62px);
    }

    .touch-button {
      width: 66px;
      height: 66px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 8px;
      background: rgba(12, 22, 34, 0.36);
      color: white;
      font-size: 30px;
      font-weight: 850;
      line-height: 1;
      display: grid;
      place-items: center;
      backdrop-filter: blur(9px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
      -webkit-tap-highlight-color: transparent;
    }

    .pedals .touch-button {
      width: 62px;
      height: 62px;
      font-size: 24px;
    }

    .touch-button:active,
    .touch-button.is-down,
    .icon-button:active {
      background: rgba(255, 255, 255, 0.34);
      transform: translateY(1px);
    }

    .speed-lines {
      position: fixed;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms linear;
      overflow: hidden;
    }

    .speed-lines span {
      position: absolute;
      top: var(--y);
      left: var(--x);
      width: var(--w);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.78), transparent);
      transform: rotate(var(--r));
      filter: blur(0.35px);
      animation: streak 520ms linear infinite;
      animation-delay: var(--d);
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.22) 100%),
        linear-gradient(90deg, rgba(30, 220, 210, 0.1), transparent 24%, transparent 76%, rgba(246, 227, 90, 0.1));
      transition: opacity 130ms linear;
    }

    .screen-glow,
    .crash-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .screen-glow {
      z-index: 2;
      opacity: 0;
      background:
        radial-gradient(circle at 50% 64%, rgba(36, 240, 210, 0.26), transparent 28%),
        radial-gradient(circle at 50% 82%, rgba(255, 222, 82, 0.16), transparent 34%);
      mix-blend-mode: screen;
      transition: opacity 120ms linear;
    }

    .crash-flash {
      z-index: 19;
      opacity: 0;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.95), rgba(255, 80, 55, 0.34) 34%, transparent 72%);
      mix-blend-mode: screen;
    }

    .noscript {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: 24px;
      color: white;
      background: #07111f;
      text-align: center;
    }

    .noscript strong {
      display: block;
      margin-bottom: 8px;
      font-size: 24px;
    }

    @keyframes streak {
      from {
        transform: translateY(-24vh) rotate(var(--r));
      }
      to {
        transform: translateY(124vh) rotate(var(--r));
      }
    }

    @media (hover: none), (pointer: coarse) {
      .touch-controls {
        display: flex;
      }

      .hint {
        display: none;
      }
    }

    @media (max-width: 560px) {
      .hud {
        padding: 12px;
        gap: 8px;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(72px, auto));
        gap: 7px 10px;
        padding: 9px 10px;
      }

      .value {
        font-size: 16px;
      }

      .icon-button {
        width: 40px;
        height: 40px;
      }

      .touch-controls {
        padding: 12px;
      }

      .cluster {
        grid-template-columns: repeat(2, 58px);
      }

      .pedals {
        grid-template-columns: repeat(3, 54px);
      }

      .touch-button,
      .pedals .touch-button {
        width: 54px;
        height: 54px;
        font-size: 23px;
      }
    }

    @media (max-width: 380px), (max-height: 520px) and (orientation: landscape) {
      .hud {
        padding: 8px;
        align-items: flex-start;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(62px, auto));
        padding: 7px 8px;
        gap: 5px 8px;
      }

      .label {
        font-size: 9px;
      }

      .value {
        font-size: 14px;
      }

      .nitro {
        width: min(180px, 52vw);
      }

      .top-actions {
        gap: 6px;
      }

      .icon-button {
        width: 36px;
        height: 36px;
      }

      .settings {
        top: calc(env(safe-area-inset-top, 0) + 50px);
        right: 8px;
      }

      .touch-controls {
        padding: 8px;
      }

      .cluster,
      .pedals {
        gap: 8px;
      }

      .cluster {
        grid-template-columns: repeat(2, 48px);
      }

      .pedals {
        grid-template-columns: repeat(3, 48px);
      }

      .touch-button,
      .pedals .touch-button {
        width: 48px;
        height: 48px;
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <noscript>
    <div class="noscript">
      <div>
        <strong>Velocity Afterglow needs JavaScript</strong>
        Enable JavaScript in your browser to play this 3D racing game.
      </div>
    </div>
  </noscript>

  <div class="hud">
    <div class="stats">
      <div class="stat">
        <span class="label">Score</span>
        <span class="value" id="score">0 m</span>
      </div>
      <div class="stat">
        <span class="label">Speed</span>
        <span class="value" id="speed">0 km/h</span>
      </div>
      <div class="stat">
        <span class="label">Best</span>
        <span class="value" id="bestScore">0 m</span>
      </div>
      <div class="stat">
        <span class="label">Multiplier</span>
        <span class="value" id="multiplier">x1.0</span>
      </div>
      <div class="stat nitro">
        <span class="label" id="nitroLabel">Nitro Ready</span>
        <div class="bar"><div class="bar-fill" id="nitroBar"></div></div>
      </div>
      <div class="stat wide-stat">
        <span class="label" id="mapLabel">Neon Coast</span>
        <span class="value" id="survival">0:00</span>
      </div>
    </div>
    <div class="top-actions">
      <div class="hint">W/S drive, A/D steer. Space/Shift nitro. P pauses.</div>
      <button class="icon-button" id="muteButton" aria-label="Mute sound" title="Mute sound">🔊</button>
      <button class="icon-button" id="pauseButton" aria-label="Pause" title="Pause">Ⅱ</button>
      <button class="icon-button" id="settingsButton" aria-label="Settings" title="Settings">⚙</button>
    </div>
  </div>

  <div class="settings" id="settingsPanel" hidden>
    <h2>Settings</h2>
    <div class="setting-row">
      <label for="qualitySelect">Graphics</label>
      <select id="qualitySelect">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="setting-row">
      <label for="mapSelect">Map</label>
      <select id="mapSelect">
        <option value="coast">Neon Coast</option>
        <option value="desert">Solar Dunes</option>
        <option value="forest">Pine Circuit</option>
        <option value="city">Midnight City</option>
      </select>
    </div>
    <div class="setting-row toggle-row">
      <label for="soundToggle">Sound</label>
      <input type="checkbox" id="soundToggle" checked />
    </div>
    <div class="menu-actions">
      <button class="menu-button" id="shopButton">Shop</button>
      <button class="menu-button" id="leaderboardButton">Leaderboard</button>
    </div>
    <p class="setting-copy" id="qualityCopy">Auto lowers effects on slower or mobile devices.</p>
  </div>

  <div class="speed-lines" id="speedLines" aria-hidden="true"></div>
  <div class="screen-glow" id="screenGlow" aria-hidden="true"></div>
  <div class="vignette" id="vignette" aria-hidden="true"></div>
  <div class="crash-flash" id="crashFlash" aria-hidden="true"></div>

  <div class="touch-controls" aria-hidden="true">
    <div class="cluster">
      <button class="touch-button" data-control="left">‹</button>
      <button class="touch-button" data-control="right">›</button>
    </div>
    <div class="pedals">
      <button class="touch-button" data-control="brake">−</button>
      <button class="touch-button" data-control="nitro">N</button>
      <button class="touch-button" data-control="accelerate">+</button>
    </div>
  </div>

  <div class="overlay" id="gameOver">
    <div class="panel">
      <h1>Game Over</h1>
      <p id="finalScore">Score: 0 m</p>
      <div class="panel-actions">
        <button class="restart" id="restart">Restart</button>
        <button class="restart" id="gameOverLeaderboard">Leaderboard</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="pauseOverlay">
    <div class="panel">
      <h1>Paused</h1>
      <p id="pauseSummary">Velocity Afterglow</p>
      <div class="panel-actions">
        <button class="restart" id="resumeButton">Resume</button>
        <button class="restart" id="pauseRestart">Restart</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="shopOverlay">
    <div class="panel">
      <h1>Garage</h1>
      <p id="coinReadout">Coins: 0</p>
      <div class="shop-grid" id="shopGrid"></div>
      <button class="restart" id="closeShop">Close</button>
    </div>
  </div>

  <div class="overlay" id="leaderboardOverlay">
    <div class="panel">
      <h1>Leaderboard</h1>
      <p>Longest survived</p>
      <div class="leaderboard-list" id="leaderboardList"></div>
      <button class="restart" id="closeLeaderboard">Close</button>
    </div>
  </div>

  <script type="module">
    // Single-file GitHub Pages build. The only network dependency is this pinned Three.js CDN import.
    import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

    function detectDevice() {
      const coarsePointer = matchMedia("(hover: none), (pointer: coarse)").matches;
      const uaMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      const smallScreen = Math.min(window.innerWidth, window.innerHeight) < 760;
      const cores = navigator.hardwareConcurrency || 4;
      const memory = navigator.deviceMemory || 4;
      const dpr = window.devicePixelRatio || 1;
      const mobile = coarsePointer || uaMobile || smallScreen;
      const weak = memory <= 3 || cores <= 4 || (mobile && dpr >= 2.75);
      const strong = !mobile && memory >= 8 && cores >= 8;

      return {
        mobile,
        weak,
        label: mobile ? (weak ? "mobile low" : "mobile") : (strong ? "desktop high" : "desktop"),
        defaultQuality: weak ? "low" : (strong ? "high" : "medium"),
        maxPixelRatio: weak ? 1 : (mobile ? 1.2 : 1.75),
        trafficScale: weak ? 0.62 : (mobile ? 0.74 : 1),
        sceneryScale: weak ? 0.56 : (mobile ? 0.72 : 1),
        speedLineScale: weak ? 0.38 : (mobile ? 0.58 : 1),
        effects: !weak,
        allowShadows: !weak && !mobile
      };
    }

    const device = detectDevice();
    const savedQuality = localStorage.getItem("racer-quality") || "auto";

    const QUALITY = {
      low: { pixelRatio: 1, antialias: false, traffic: 9, scenery: 10, lamps: false, effects: false, shadows: false, shadowSize: 0, fogFar: 320 },
      medium: { pixelRatio: 1.3, antialias: false, traffic: 15, scenery: 18, lamps: true, effects: true, shadows: true, shadowSize: 1024, fogFar: 390 },
      high: { pixelRatio: 1.85, antialias: true, traffic: 22, scenery: 28, lamps: true, effects: true, shadows: true, shadowSize: 1536, fogFar: 470 }
    };

    const MAPS = {
      coast: { name: "Neon Coast", road: 0x28313a, grass: 0x4c8f50, tree: 0x2e6f43, rail: 0xd0d7dc, fog: 1, curve: 1.0 },
      desert: { name: "Solar Dunes", road: 0x313238, grass: 0x9f8c55, tree: 0x657a42, rail: 0xd8c69a, fog: 0.86, curve: 0.72 },
      forest: { name: "Pine Circuit", road: 0x252f34, grass: 0x2f7b3f, tree: 0x1f5e35, rail: 0xb8c3c4, fog: 0.74, curve: 1.25 },
      city: { name: "Midnight City", road: 0x202832, grass: 0x3d5f52, tree: 0x2d6b50, rail: 0xc8d4df, fog: 1.08, curve: 0.9 }
    };

    const SHOP_ITEMS = [
      { id: "engine", name: "Engine", max: 5, baseCost: 180, description: "Higher top speed and acceleration" },
      { id: "handling", name: "Handling", max: 5, baseCost: 160, description: "Better grip and faster steering" },
      { id: "nitro", name: "Nitro", max: 5, baseCost: 150, description: "Longer boost and faster recharge" }
    ];

    let selectedQuality = QUALITY[savedQuality] ? savedQuality : device.defaultQuality;
    let currentMapId = localStorage.getItem("racer-map") || "coast";
    if (!MAPS[currentMapId]) currentMapId = "coast";
    let activeQualityName = selectedQuality;
    let quality = QUALITY[activeQualityName];

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 720);
    const renderer = new THREE.WebGLRenderer({
      antialias: quality.antialias,
      powerPreference: "high-performance"
    });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, quality.pixelRatio, device.maxPixelRatio));
    renderer.shadowMap.enabled = quality.shadows && device.allowShadows;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.42);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x47684c, 1.15);
    scene.add(hemiLight);

    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(-80, 140, 90);
    sun.castShadow = true;
    sun.shadow.camera.left = -28;
    sun.shadow.camera.right = 28;
    sun.shadow.camera.top = 36;
    sun.shadow.camera.bottom = -18;
    sun.shadow.camera.near = 20;
    sun.shadow.camera.far = 260;
    sun.shadow.bias = -0.00035;
    scene.add(sun);

    const moon = new THREE.DirectionalLight(0x8eb7ff, 0.0);
    moon.position.set(70, 80, -90);
    scene.add(moon);

    const roadGroup = new THREE.Group();
    const trafficGroup = new THREE.Group();
    const sceneryGroup = new THREE.Group();
    scene.add(roadGroup, trafficGroup, sceneryGroup);

    const ROAD_WIDTH = 16;

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
      return texture;

    function drawSkyTexture(dayAmount, duskAmount) {
      const ctx = skyCanvas.getContext("2d");
      const w = skyCanvas.width;
      const h = skyCanvas.height;
      const topDay = [92, 171, 236];
      const horizonDay = [198, 232, 255];
      const topNight = [4, 11, 26];
      const horizonNight = [22, 34, 58];
      const duskTop = [70, 65, 116];
      const duskHorizon = [242, 139, 100];

      const mix = (a, b, t) => a + (b - a) * t;
      const color = (a, b, c) => `rgb(${Math.round(a)}, ${Math.round(b)}, ${Math.round(c)})`;
      const top = topNight.map((v, i) => mix(v, topDay[i], dayAmount));
      const horizon = horizonNight.map((v, i) => mix(v, horizonDay[i], dayAmount));
      for (let i = 0; i < 3; i++) {
        top[i] = mix(top[i], duskTop[i], duskAmount * 0.34);
        horizon[i] = mix(horizon[i], duskHorizon[i], duskAmount * 0.48);
      }

      const gradient = ctx.createLinearGradient(0, 0, 0, h);
      gradient.addColorStop(0, color(top[0], top[1], top[2]));
      gradient.addColorStop(0.72, color(horizon[0], horizon[1], horizon[2]));
      gradient.addColorStop(1, color(mix(horizon[0], 35, 0.35), mix(horizon[1], 70, 0.35), mix(horizon[2], 55, 0.35)));
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);

      const nightAlpha = Math.max(0, 1 - dayAmount * 1.4);
      ctx.fillStyle = `rgba(255,255,255,${0.76 * nightAlpha})`;
      for (let i = 0; i < 130; i++) {
        const x = (i * 97) % w;
        const y = (i * 53) % Math.floor(h * 0.52);
        const r = ((i * 19) % 3) + 0.7;
        ctx.beginPath();
        ctx.arc(x, y, r * 0.45, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = 0.18 + dayAmount * 0.42;
      for (let i = 0; i < 12; i++) {
        const x = (i * 181 + 70) % w;
        const y = 80 + ((i * 43) % 170);
        const cloud = ctx.createRadialGradient(x, y, 0, x, y, 72 + (i % 4) * 18);
        cloud.addColorStop(0, "rgba(255,255,255,0.85)");
        cloud.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = cloud;
        ctx.fillRect(x - 150, y - 80, 300, 160);
      }
      ctx.globalAlpha = 1;
      skyTexture.needsUpdate = true;
    }

    function setMuted(isMuted) {
      audio.muted = isMuted;
      localStorage.setItem("racer-muted", String(isMuted));
      if (audio.master && audio.ctx) {
        audio.master.gain.setTargetAtTime(isMuted ? 0 : 0.24, audio.ctx.currentTime, 0.025);
      }
      if (muteButton) {
        muteButton.textContent = isMuted ? "🔇" : "🔊";

      }

        soundToggle.checked = !isMuted;

    function initAudio() {
      if (audio.started) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      audio.ctx = new AudioContext();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = audio.muted ? 0 : 0.24;
      audio.master.connect(audio.ctx.destination);

      audio.engineGain = audio.ctx.createGain();
      audio.engineGain.gain.value = 0.0;
      audio.engineSubGain = audio.ctx.createGain();
      audio.engineSubGain.gain.value = 0.0;

      audio.engineFilter = audio.ctx.createBiquadFilter();
      audio.engineFilter.type = "lowpass";
      audio.engineFilter.frequency.value = 420;

      audio.engineOsc = audio.ctx.createOscillator();
      audio.engineOsc.type = "sawtooth";
      audio.engineOsc.frequency.value = 72;

      audio.engineSubOsc = audio.ctx.createOscillator();
      audio.engineSubOsc.type = "square";
      audio.engineSubOsc.frequency.value = 38;

      audio.engineOsc.connect(audio.engineFilter);
      audio.engineFilter.connect(audio.engineGain);
      audio.engineGain.connect(audio.master);
      audio.engineSubOsc.connect(audio.engineSubGain);
      audio.engineSubGain.connect(audio.master);
      audio.engineOsc.start();
      audio.engineSubOsc.start();
      audio.started = true;
      setMuted(audio.muted);
    }

    function updateAudio(delta) {
      if (!audio.started || !audio.ctx) return;
      const t = audio.ctx.currentTime;
      const speed01 = THREE.MathUtils.clamp(Math.max(speed, 0) / 118, 0, 1);
      const throttle01 = THREE.MathUtils.clamp(Math.max(throttleInput, 0) + (isNitroActive() ? 0.35 : 0), 0, 1.35);
      audio.engineOsc.frequency.setTargetAtTime(62 + speed01 * 126 + throttle01 * 22, t, 0.045);
      audio.engineSubOsc.frequency.setTargetAtTime(34 + speed01 * 42, t, 0.06);
      audio.engineFilter.frequency.setTargetAtTime(360 + speed01 * 980 + throttle01 * 360, t, 0.06);
      audio.engineGain.gain.setTargetAtTime(gameOver ? 0.018 : 0.04 + speed01 * 0.13 + throttle01 * 0.035, t, 0.08);
      audio.engineSubGain.gain.setTargetAtTime(gameOver ? 0.0 : 0.012 + speed01 * 0.035, t, 0.09);
    }

    function playNitroSound() {
      if (!audio.started || !audio.ctx || audio.muted) return;
      const t = audio.ctx.currentTime;
      const osc = audio.ctx.createOscillator();
      const gain = audio.ctx.createGain();
      const filter = audio.ctx.createBiquadFilter();
      const noise = audio.ctx.createBufferSource();
      const noiseGain = audio.ctx.createGain();
      const noiseFilter = audio.ctx.createBiquadFilter();
      const noiseBuffer = audio.ctx.createBuffer(1, Math.floor(audio.ctx.sampleRate * 0.28), audio.ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) noiseData[i] = (Math.random() * 2 - 1) * (1 - i / noiseData.length);
      noise.buffer = noiseBuffer;
      osc.type = "triangle";
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(720, t + 0.2);
      filter.type = "highpass";
      filter.frequency.value = 260;
      noiseFilter.type = "highpass";
      noiseFilter.frequency.value = 900;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.13, t + 0.035);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.38);
      noiseGain.gain.setValueAtTime(0.0001, t);
      noiseGain.gain.exponentialRampToValueAtTime(0.055, t + 0.025);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audio.master);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audio.master);
      osc.start(t);
      noise.start(t);
      osc.stop(t + 0.4);
      noise.stop(t + 0.3);
    }

    function playCrashSound() {
      if (!audio.started || !audio.ctx || audio.muted) return;
      const t = audio.ctx.currentTime;
      const osc = audio.ctx.createOscillator();
      const gain = audio.ctx.createGain();
      const filter = audio.ctx.createBiquadFilter();
      const noise = audio.ctx.createBufferSource();
      const noiseGain = audio.ctx.createGain();
      const noiseFilter = audio.ctx.createBiquadFilter();
      const noiseBuffer = audio.ctx.createBuffer(1, Math.floor(audio.ctx.sampleRate * 0.38), audio.ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) noiseData[i] = (Math.random() * 2 - 1) * (1 - i / noiseData.length);
      noise.buffer = noiseBuffer;
      osc.type = "square";
      osc.frequency.setValueAtTime(92, t);
      osc.frequency.exponentialRampToValueAtTime(28, t + 0.32);
      filter.type = "lowpass";
      filter.frequency.value = 820;
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.value = 680;
      noiseFilter.Q.value = 0.8;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.32, t + 0.018);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.46);
      noiseGain.gain.setValueAtTime(0.0001, t);
      noiseGain.gain.exponentialRampToValueAtTime(0.24, t + 0.012);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.36);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audio.master);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audio.master);
      osc.start(t);
      noise.start(t);
      osc.stop(t + 0.5);
      noise.stop(t + 0.4);
    }

    function damp(current, target, smoothing, delta) {

    function roadCurveAt(worldDistance) {
      const curveStrength = MAPS[currentMapId].curve;
      return (
        Math.sin(worldDistance * 0.0065) * 10.5 +

        Math.sin(worldDistance * 0.013 + 3.2) * 2.4
      ) * curveStrength;
    }

    function roadCurveOffset(worldDistance) {
      return roadCurveAt(worldDistance) - roadCurveAt(distance);

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, quality.pixelRatio, device.maxPixelRatio));
      renderer.shadowMap.enabled = shadowsEnabled;
      sun.shadow.mapSize.set(quality.shadowSize || 1, quality.shadowSize || 1);
      sun.shadow.map?.dispose();
      sun.shadow.map = null;
      if (scene.fog) scene.fog.far = quality.fogFar;

      for (let i = 0; i < trafficCars.length; i++) {
        trafficCars[i].visible = i < trafficLimit;

      for (const object of sceneryObjects) {

          object.visible = activeQualityName === "low" || device.weak ? buildingCount % 3 === 0 : true;

    function autoScalePerformance(delta) {
      const fps = 1 / Math.max(delta, 0.001);
      fpsAverage = damp(fpsAverage, fps, 0.65, delta);

      if (activeQualityName === "low") return;

      if (fpsAverage < (device.mobile ? 50 : 46)) {

    function getTrafficLimit() {
      const base = Math.max(5, Math.floor(quality.traffic * device.trafficScale));
      const speedBoost = Math.floor(THREE.MathUtils.clamp(speed / 22, 0, 5));
      const timeBoost = Math.floor(THREE.MathUtils.clamp(survivalTime / 28, 0, 6));
      return Math.min(trafficCars.length, base + speedBoost + timeBoost);
    }

    function spawnTrafficCar(trafficCar, minAhead = SPAWN_MIN, maxAhead = SPAWN_MAX) {
      const data = trafficCar.userData;
      let lane = Math.floor(Math.random() * LANES.length);
      let tries = 0;
      const targetDistance = distance + minAhead;

      while (tries < 8 && trafficCars.some((other) => {
        if (other === trafficCar || !other.visible) return false;
        return other.userData.lane === lane && Math.abs(other.userData.distance - targetDistance) < 48;
      })) {
        lane = Math.floor(Math.random() * LANES.length);
        tries++;
      }

      data.lane = lane;
      data.targetLane = lane;
      data.distance = distance + randomRange(minAhead, maxAhead);
      data.speed = randomRange(28, 48) + Math.min(gameTime * 0.08, 9);
      data.changeTimer = randomRange(1.2, 4.8);
      data.z = -(data.distance - distance);

      trafficCar.position.set(roadCurveOffset(data.distance) + LANES[lane], 0, data.z);
      trafficCar.rotation.set(0, 0, 0);
    }

    function resetTraffic() {
      for (let i = 0; i < trafficCars.length; i++) {
        spawnTrafficCar(trafficCars[i], SPAWN_MIN + i * 36, SPAWN_MAX + i * 42);
      }
    }

    function findNearbyTrafficInLane(lane, fromDistance, maxGap) {
      let closest = null;
      let closestGap = maxGap;

      for (const trafficCar of trafficCars) {
        if (!trafficCar.visible) continue;
        const data = trafficCar.userData;
        if (data.lane !== lane) continue;
        const gap = data.distance - fromDistance;
        if (gap > 0 && gap < closestGap) {
          closest = trafficCar;
          closestGap = gap;
        }
      }

      return closest;
    }

    function isNitroActive() {
      return controls.nitro && nitro > 0 && nitroCooldown <= 0 && !gameOver;
    }

    function updateNitro(delta) {
      const active = isNitroActive();
      if (active && !nitroWasActive) playNitroSound();
      nitroWasActive = active;

      if (active) {
        nitro = Math.max(0, nitro - delta * (0.42 - (upgrades.nitro || 0) * 0.025));
        if (nitro <= 0) nitroCooldown = 2.2;
      } else if (nitroCooldown > 0) {
        nitroCooldown = Math.max(0, nitroCooldown - delta);
      } else {
        nitro = Math.min(1, nitro + delta * (0.18 + (upgrades.nitro || 0) * 0.018));
      }
    }

    function updateCar(delta) {
      const targetThrottle = Number(controls.accelerate) - Number(controls.brake);
      const targetSteering = Number(controls.left) - Number(controls.right);
      const engineLevel = upgrades.engine || 0;
      const handlingLevel = upgrades.handling || 0;
      const nitroLevel = upgrades.nitro || 0;
      difficulty = 1 + Math.min(survivalTime * 0.018, 2.8);
      const speedRamp = Math.min(gameTime * 0.2, 34);
      const topSpeed = 76 + speedRamp + engineLevel * 5 + (isNitroActive() ? 36 + nitroLevel * 3 : 0);
      const reverseSpeed = -16;
      const speed01 = THREE.MathUtils.clamp(Math.max(speed, 0) / topSpeed, 0, 1);
      const steeringSmoothness = 6.2 - speed01 * 2.3 + handlingLevel * 0.22;
      const throttleSmoothness = targetThrottle === 0 ? 4.2 : 5.8;

      throttleInput = damp(throttleInput, targetThrottle, throttleSmoothness, delta);
      steeringInput = damp(steeringInput, targetSteering, steeringSmoothness, delta);

      const engineForce = (48 + speedRamp * 0.25 + engineLevel * 2.8) * (1 - speed01 * 0.24);
      const brakeForce = speed > 0 ? 82 : 44;
      const rollingDrag = 0.72 + speed01 * 1.35;
      const airDrag = speed * Math.abs(speed) * 0.0065;

      if (throttleInput > 0.02) {
        speed += throttleInput * engineForce * delta;
      } else if (throttleInput < -0.02) {
        speed += throttleInput * brakeForce * delta;
      }

      speed -= Math.sign(speed) * rollingDrag * delta;
      speed -= airDrag * delta;
      if (Math.abs(speed) < 0.08 && Math.abs(throttleInput) < 0.05) speed = 0;

      if (isNitroActive()) speed += (43 + nitroLevel * 2.8 - speed01 * 8) * delta;
      speed = THREE.MathUtils.clamp(speed, reverseSpeed, topSpeed);

      const grip = THREE.MathUtils.clamp(1.08 - speed01 * 0.58 + handlingLevel * 0.035, 0.43, 1.08);
      const handling = (19 + handlingLevel * 1.1 - speed01 * 9.5) * grip;
      const desiredLateralVelocity = steeringInput * handling;
      const lateralResponse = 8.2 - speed01 * 3.8;
      lateralVelocity = damp(lateralVelocity, desiredLateralVelocity, lateralResponse, delta);

      const driftTarget = THREE.MathUtils.clamp(
        Math.abs(steeringInput) * Math.max(0, speed01 - 0.42) * (1.05 - grip + Math.abs(lateralVelocity) * 0.025),
        0,
        1
      );
      driftAmount = damp(driftAmount, driftTarget, driftTarget > driftAmount ? 5.4 : 3.2, delta);

      const slide = lateralVelocity * (1 + driftAmount * 0.42);
      carPosition.x += lateralVelocity * delta;
      carPosition.x += driftAmount * steeringInput * Math.max(speed, 0) * 0.018 * delta;
      carPosition.x = THREE.MathUtils.clamp(carPosition.x, -ROAD_WIDTH * 0.42, ROAD_WIDTH * 0.42);

      const forwardDelta = Math.max(speed, 0) * delta;
      distance += forwardDelta;
      scoreMultiplier = 1 + Math.floor(survivalTime / 25) * 0.25 + Math.min(speed01 * 0.65, 0.65) + (isNitroActive() ? 0.35 : 0);
      score += forwardDelta * scoreMultiplier;

      const targetHeading = -steeringInput * (0.18 + speed01 * 0.22) - slide * 0.018;
      heading = damp(heading, targetHeading, 7.2 - speed01 * 1.8, delta);
      car.position.set(carPosition.x, 0, 0);
      car.rotation.set(
        0,
        heading + driftAmount * steeringInput * 0.12,
        -lateralVelocity * 0.014 - driftAmount * steeringInput * 0.075
      );

      const wheelSpin = speed * delta * 1.8;
      for (let i = 0; i < wheels.length; i++) {
        wheels[i].rotation.x += wheelSpin;
        if (i < 2) wheels[i].rotation.y = -steeringInput * (0.24 - speed01 * 0.08);
      }
    }

    function updateRoad() {
      const base = Math.floor(distance / SEGMENT_LENGTH) * SEGMENT_LENGTH;

      for (let i = 0; i < roadSegments.length; i++) {
        const z = -i * SEGMENT_LENGTH + (distance - base);
        const wrappedZ = z > SEGMENT_LENGTH * 0.5 ? z - ROAD_SPAN : z;
        const segmentDistance = distance - wrappedZ;
        roadSegments[i].position.z = wrappedZ;
        roadSegments[i].position.x = roadCurveOffset(segmentDistance);
        roadSegments[i].rotation.y = (roadCurveOffset(segmentDistance + 18) - roadCurveOffset(segmentDistance - 18)) * 0.0025;
      }
    }

    function updateScenery() {
      for (const object of sceneryObjects) {
        const offset = object.userData.offset;
        const span = object.userData.span || 860;
        let z = -(offset - (distance % span));
        if (z > 64) z -= span;
        const objectDistance = distance - z;
        const curve = roadCurveOffset(objectDistance);
        object.position.x = curve + object.userData.baseX;
        object.position.z = z;
      }
    }

    function updateTraffic(delta) {
      const activeLimit = getTrafficLimit();
      for (let i = 0; i < trafficCars.length; i++) {
        const trafficCar = trafficCars[i];
        trafficCar.visible = i < activeLimit;
        if (!trafficCar.visible) continue;
        const data = trafficCar.userData;
        data.distance += (data.speed + Math.min(difficulty * 1.8, 8)) * delta;
        data.changeTimer -= delta;

        const blocker = findNearbyTrafficInLane(data.lane, data.distance, 30);
        if (blocker && data.changeTimer <= 0) {
          const direction = Math.random() < 0.5 ? -1 : 1;
          const nextLane = THREE.MathUtils.clamp(data.lane + direction, 0, LANES.length - 1);
          if (!findNearbyTrafficInLane(nextLane, data.distance - 12, 54)) data.targetLane = nextLane;
          data.changeTimer = randomRange(1.5, 3.5);
        } else if (data.changeTimer <= 0 && Math.random() < 0.25) {
          data.targetLane = THREE.MathUtils.clamp(data.lane + (Math.random() < 0.5 ? -1 : 1), 0, LANES.length - 1);
          data.changeTimer = randomRange(2.0, 5.0);
        }

        const curve = roadCurveOffset(data.distance);
        const targetX = curve + LANES[data.targetLane];
        trafficCar.position.x = damp(trafficCar.position.x, targetX, 2.4, delta);
        if (Math.abs(trafficCar.position.x - targetX) < 0.12) data.lane = data.targetLane;

        data.z = -(data.distance - distance);
        trafficCar.position.z = data.z;
        trafficCar.rotation.y = (targetX - trafficCar.position.x) * 0.03 + (roadCurveOffset(data.distance + 16) - curve) * 0.01;

        if (data.z > 22 || data.z < -SPAWN_MAX - 220) {
          spawnTrafficCar(trafficCar, SPAWN_MAX * 0.55, SPAWN_MAX + 120);
        }
      }
    }

    function checkCollisions() {
      for (const trafficCar of trafficCars) {
        if (!trafficCar.visible) continue;
        const dx = Math.abs(trafficCar.position.x - car.position.x);
        const dz = Math.abs(trafficCar.position.z - car.position.z);
        if (dx < 2.05 && dz < 3.55) {
          endGame();
          return;
        }
      }
    }

    function updateLighting(delta) {
      dayTime = (dayTime + delta * 0.0075) % 1;
      const sunAngle = dayTime * Math.PI * 2;
      const sunHeight = Math.sin(sunAngle);
      const dayAmount = THREE.MathUtils.smoothstep(sunHeight, -0.18, 0.42);
      const duskAmount = 1 - Math.abs(dayAmount - 0.5) * 2;

      const skyDay = new THREE.Color(0x83c9ff);
      const skyNight = new THREE.Color(0x07111f);
      const skyDusk = new THREE.Color(0xf18d73);
      const sky = skyNight.clone().lerp(skyDay, dayAmount).lerp(skyDusk, duskAmount * 0.28);
      scene.fog = scene.fog || new THREE.Fog(sky, 120, quality.fogFar);
      scene.fog.color.copy(sky);
      scene.fog.near = 115;
      scene.fog.far = quality.fogFar;

      skyUpdateTimer += delta;
      if (skyUpdateTimer > 0.28) {
        drawSkyTexture(dayAmount, duskAmount);
        skyUpdateTimer = 0;
      }

      ambientLight.intensity = 0.2 + dayAmount * 0.46;
      ambientLight.color.copy(skyNight).lerp(new THREE.Color(0xffffff), dayAmount);
      hemiLight.intensity = 0.34 + dayAmount * 1.28;
      sun.intensity = 0.14 + dayAmount * 1.75;
      moon.intensity = 0.48 * (1 - dayAmount);
      sun.position.set(Math.cos(sunAngle) * 120, 40 + Math.max(sunHeight, 0.05) * 150, Math.sin(sunAngle) * 120);
      moon.position.set(-sun.position.x, 70, -sun.position.z);

      lampMaterial.color.set(dayAmount < 0.42 ? 0xfff0bf : 0xd9d0aa);
      lampMaterial.opacity = 1 - dayAmount;
    }

    function updateCamera(delta) {
      const speed01 = THREE.MathUtils.clamp(Math.max(speed, 0) / 118, 0, 1);
      const highSpeedShake = Math.max(0, speed01 - 0.62) * 0.19;
      const nitroShake = isNitroActive() ? 0.045 : 0;
      const crashShake = crashEffect * 0.7;
      const shake = quality.effects && device.effects
        ? highSpeedShake + driftAmount * 0.06 + nitroShake + crashShake
        : crashShake * 0.45;
      const shakeX = (Math.random() - 0.5) * shake;
      const shakeY = (Math.random() - 0.5) * shake * 0.7;
      const bendLookAhead = roadCurveOffset(distance + 120) * 0.2;

      cameraTarget.set(
        car.position.x * 0.54 + bendLookAhead * 0.35 + shakeX,
        6.35 + Math.abs(speed) * 0.012 + shakeY,
        11.4 + Math.abs(speed) * 0.045
      );

      camera.position.x = damp(camera.position.x, cameraTarget.x, 4.4, delta);
      camera.position.y = damp(camera.position.y, cameraTarget.y, 4.4, delta);
      camera.position.z = damp(camera.position.z, cameraTarget.z, 4.4, delta);

      cameraLookAt.set(
        car.position.x * 0.72 + bendLookAhead + driftAmount * steeringInput * 1.8 + shakeX * 0.5,
        1.15 + shakeY * 0.35,
        -22
      );
      smoothLookAt.lerp(cameraLookAt, 1 - Math.exp(-5.5 * delta));
      camera.lookAt(smoothLookAt);
      camera.fov = damp(camera.fov, 62 + speed01 * 6 + (isNitroActive() ? 5.5 : 0) + crashEffect * 2, 5, delta);
      camera.updateProjectionMatrix();
      skybox.position.copy(camera.position);
    }

    function emitSmoke() {
      const particle = smokeParticles.find((item) => item.userData.life <= 0);
      if (!particle) return;
      particle.userData.life = 0.55 + Math.random() * 0.35;
      particle.userData.maxLife = particle.userData.life;
      particle.position.set(
        car.position.x + (Math.random() < 0.5 ? -0.85 : 0.85) + randomRange(-0.18, 0.18),
        0.36 + Math.random() * 0.12,
        1.55 + Math.random() * 0.7
      );
      const size = 0.8 + Math.random() * 0.55;
      particle.scale.set(size, size, size);
      particle.material.opacity = 0.36;
      particle.visible = true;
    }

    function updateEffects(delta) {
      const speed01 = THREE.MathUtils.clamp(Math.max(speed, 0) / 118, 0, 1);
      const nitroActive = isNitroActive();
      const nitroGlow = nitroActive ? 0.48 : 0;
      const effectsEnabled = quality.effects && device.effects;
      const amount = effectsEnabled ? Math.max(0, speed01 - 0.48) * 1.85 + nitroGlow + driftAmount * 0.2 : 0;
      const pulse = 0.82 + Math.sin(gameTime * 42) * 0.18;

      speedLines.style.opacity = Math.min(amount, 0.86);
      speedLines.style.transform = `scale(${1 + Math.min(speed01, 1) * 0.035})`;
      screenGlow.style.opacity = Math.min((Math.max(0, speed01 - 0.58) * 0.34 + nitroGlow * 0.7) * pulse, 0.58);
      vignette.style.opacity = Math.min(amount * 0.64 + crashEffect * 0.18, 0.58);
      crashFlash.style.opacity = Math.min(crashEffect, 1);

      const bloom = effectsEnabled ? Math.max(0, speed01 - 0.56) * 0.13 + (nitroActive ? 0.16 : 0) : 0;
      renderer.domElement.style.filter = `saturate(${1 + bloom * 1.45}) brightness(${1 + bloom * 0.42}) contrast(${1 + bloom * 0.18})`;

      for (let i = 0; i < nitroFlames.length; i++) {
        const flame = nitroFlames[i];
        const material = nitroMaterials[i];
        const activeScale = nitroActive && effectsEnabled ? 1 : 0.01;
        const flamePulse = 0.82 + Math.sin(gameTime * (28 + i * 7)) * 0.16;
        flame.visible = activeScale > 0.05;
        flame.scale.set(
          activeScale * (0.7 + i * 0.2) * flamePulse,
          activeScale * (0.7 + i * 0.15) * flamePulse,
          activeScale * (1.05 + i * 0.22) * flamePulse
        );
        flame.rotation.z = Math.sin(gameTime * 22 + i) * 0.18;
        material.opacity = nitroActive && effectsEnabled ? 0.52 - i * 0.08 : 0;
      }

      const braking = controls.brake || speed < -1;
      for (const tail of playerTailLights) {
        tail.scale.set(braking ? 1.35 : 1, braking ? 1.35 : 1, 1);
        tail.material.color.set(braking ? 0xff0015 : 0xff233b);
      }

      if (effectsEnabled && driftAmount > 0.28 && Math.random() < driftAmount * 0.55) {
        emitSmoke();
      }

      for (const particle of smokeParticles) {
        if (particle.userData.life <= 0) continue;
        particle.userData.life -= delta;
        const t = particle.userData.life / particle.userData.maxLife;
        particle.position.z += (2.8 + Math.max(speed, 0) * 0.05) * delta;
        particle.position.y += 0.42 * delta;
        particle.scale.multiplyScalar(1 + delta * 0.68);
        particle.material.opacity = Math.max(0, t * 0.34);
        if (particle.userData.life <= 0) {
          particle.visible = false;
          particle.material.opacity = 0;
        }
      }

      crashEffect = Math.max(0, crashEffect - 2.6 * delta);
    }

    function updateUI(force = false) {
      scoreReadout.textContent = `${Math.floor(score)} m`;
      speedReadout.textContent = `${Math.round(Math.max(speed, 0) * 3.2)} km/h`;
      bestScoreReadout.textContent = `${Math.floor(highScore)} m`;
      multiplierReadout.textContent = `x${scoreMultiplier.toFixed(1)}`;
      survivalReadout.textContent = formatTime(survivalTime);
      mapLabel.textContent = MAPS[currentMapId].name;
      nitroBar.style.transform = `scaleX(${nitro})`;

      if (nitroCooldown > 0) {
        nitroLabel.textContent = "Nitro Cooling";
      } else if (nitro >= 0.98) {
        nitroLabel.textContent = "Nitro Ready";
      } else {
        nitroLabel.textContent = "Nitro Charging";
      }
    }

    function endGame() {
      if (gameOver) return;
      gameOver = true;
      crashEffect = 1;
      recordRun();
      playCrashSound();
      controls.accelerate = false;
      controls.brake = false;
      controls.left = false;
      controls.right = false;
      controls.nitro = false;
      finalScore.textContent = `Score: ${Math.floor(score)} m · Survived ${formatTime(survivalTime)} · +${runCoins} coins`;
      gameOverOverlay.classList.add("is-visible");
    }

    function restartGame() {
      setPaused(false);
      speed = 0;
      lateralVelocity = 0;
      throttleInput = 0;
      steeringInput = 0;
      driftAmount = 0;
      crashEffect = 0;
      heading = 0;
      distance = 0;
      score = 0;
      gameTime = 0;
      survivalTime = 0;
      scoreMultiplier = 1;
      difficulty = 1;
      runCoins = 0;
      nitro = 1;
      nitroCooldown = 0;
      gameOver = false;
      runRecorded = false;
      nitroWasActive = false;
      carPosition.set(0, 0, 0);
      car.position.set(0, 0, 0);
      car.rotation.set(0, 0, 0);
      camera.position.set(0, 6.5, 12);
      camera.fov = 62;
      camera.updateProjectionMatrix();
      smoothLookAt.set(0, 1, -12);
      resetTraffic();
      gameOverOverlay.classList.remove("is-visible");
      crashFlash.style.opacity = 0;
      renderer.domElement.style.filter = "";
      updateUI();
    }

    function animate() {
      const delta = Math.min(clock.getDelta(), 1 / 40);
      autoScalePerformance(delta);
      updateLighting(delta);

      if (!gameOver && !isPaused) {
        gameTime += delta;
        survivalTime += delta;
        updateNitro(delta);
        updateCar(delta);
        updateRoad();
        updateScenery();
        updateTraffic(delta);
        checkCollisions();
      } else {
        speed = damp(speed, 0, 2.5, delta);
      }

      updateCamera(delta);
      updateEffects(delta);
      updateAudio(delta);
      uiTimer += delta;
      if (uiTimer > 0.08 || gameOver || isPaused) {
        updateUI();
        uiTimer = 0;
      }
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, quality.pixelRatio, device.maxPixelRatio));
    }

    window.addEventListener("resize", resize);

    scene.fog = new THREE.Fog(0x83c9ff, 115, quality.fogFar);
    applyMap();
    applyQuality(activeQualityName, false);
    restartGame();
    animate();
  </script>
</body>
